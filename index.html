<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог Деликатесов</title>
    
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .product-card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 300px;
        }
        h1 { color: #333; }
        button {
            background-color: #248b1d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>🧀 Наш Каталог</h1>
    <p>Выберите лучшие деликатесы:</p>

    <div class="product-card">
        <h3>Сыр Пармезан</h3>
        <p>Выдержка 24 месяца. Прямо из Италии.</p>
        <button onclick="orderItem('Сыр Пармезан')">Выбрать</button>
    </div>

    <div class="product-card">
        <h3>Хамон Иберико</h3>
        <p>Истинный деликатес из Испании.</p>
        <button onclick="orderItem('Хамон Иберико')">Выбрать</button>
    </div>

    <script>
        
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function orderItem(itemName) {
           
            tg.sendData("Выбран товар: " + itemName);
            tg.close(); 
        }
    </script>
</body>
</html>
