<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Как Привезли?</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        .header-search {
            padding: 15px;
        }
        .search-input {
            width: 100%;
            background-color: #2c2c2c;
            border: none;
            border-radius: 8px;
            padding: 12px 12px 12px 40px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            margin-top: 10px;
        }
        .section-title h2 {
            font-size: 20px;
            margin: 0;
            font-weight: bold;
        }
        .toggle-btn {
            color: #8e8e93;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .categories-container {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 12px;
            transition: all 0.3s ease-in-out;
            max-height: 120px;
            opacity: 1;
        }
        .categories-container.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .categories-container::-webkit-scrollbar {
            display: none;
        }
        .category-item {
            flex: 0 0 75px;
            text-align: center;
        }
        .category-badge {
            width: 70px;
            height: 50px;
            background-color: #1c1c1e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid #2c2c2e;
            margin-bottom: 6px;
        }
        .category-name {
            font-size: 11px;
            color: #ffffff;
            line-height: 1.2;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }
        .product-card {
            background-color: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .fav-button {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: #000;
            transition: transform 0.1s ease;
        }
        .fav-button.active {
            color: #ff3b30;
        }
        .fav-button:active {
            transform: scale(0.9);
        }
        .product-image {
            width: 100%;
            height: 130px;
            background-color: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #8e8e93;
        }
        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-title {
            font-size: 13px;
            font-weight: 500;
            margin: 0 0 15px 0;
            height: 32px;
            overflow: hidden;
        }
        .product-price {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .add-button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 6px;
            padding: 8px 0;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: #1c1c1e;
            border-top: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-item.active {
            color: #3071ff;
        }
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="header-search">
        <input type="text" class="search-input" placeholder="🔍 Искать по магазину">
    </div>

    <div class="section-title">
        <h2>Категории</h2>
        <span class="toggle-btn" id="toggleCategories" onclick="toggleCategories()">Свернуть 🔼</span>
    </div>

    <div class="categories-container" id="categoriesBlock">
        <div class="category-item">
            <div class="category-badge">Бакалея</div>
            <div class="category-name">Бакалея</div>
        </div>
        <div class="category-item">
            <div class="category-badge">Сыры еда</div>
            <div class="category-name">Сыры для еды</div>
        </div>
        <div class="category-item">
            <div class="category-badge">Плесень</div>
            <div class="category-name">Сыры с плесенью</div>
        </div>
        <div class="category-item">
            <div class="category-badge">Козы</div>
            <div class="category-name">Козьи и овечьи сыры</div>
        </div>
        <div class="category-item">
            <div class="category-badge">Трюфель</div>
            <div class="category-name">Сыры с трюфелем</div>
        </div>
    </div>

    <div class="section-title">
        <h2>Каталог</h2>
    </div>

    <div class="catalog-grid">
        <div class="product-card">
            <button class="fav-button" onclick="toggleFavorite(this)">🤍</button>
            <div class="product-image">🧈 Масло</div>
            <div class="product-info">
                <p class="product-title">Масло Beurre d'Isigny</p>
                <div class="product-price">2 500 ₽</div>
                <button class="add-button" onclick="selectProduct('Масло Beurre d\'Isigny')">Добавить</button>
            </div>
        </div>

        <div class="product-card">
            <button class="fav-button" onclick="toggleFavorite(this)">🤍</button>
            <div class="product-image">🍪 Печенье</div>
            <div class="product-info">
                <p class="product-title">Печенье Савоярди</p>
                <div class="product-price">750 ₽</div>
                <button class="add-button" onclick="selectProduct('Печенье Савоярди')">Добавить</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Каталог</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">🛒</span>
            <span>Корзина</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function selectProduct(name) {
            tg.sendData("Выбран товар: " + name);
            tg.close();
        }

        // Логика сворачивания/разворачивания категорий
        function toggleCategories() {
            const block = document.getElementById('categoriesBlock');
            const btn = document.getElementById('toggleCategories');
            
            if (block.classList.contains('collapsed')) {
                block.classList.remove('collapsed');
                btn.innerHTML = 'Свернуть 🔼';
            } else {
                block.classList.add('collapsed');
                btn.innerHTML = 'Развернуть 🔽';
            }
        }

        // Логика работы сердечка (избранного)
        function toggleFavorite(button) {
            if (button.classList.contains('active')) {
                button.classList.remove('active');
                button.innerHTML = '🤍';
            } else {
                button.classList.add('active');
                button.innerHTML = '❤️';
            }
        }
    </script>
</body>
</html>
